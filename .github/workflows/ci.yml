name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e .

      - name: Generate synthetic raw layer
        run: python -m generate

      - name: dbt deps
        run: dbt deps --project-dir dbt --profiles-dir dbt

      - name: Build and test the whole pipeline
        run: dbt build --project-dir dbt --profiles-dir dbt

      - name: Print reports
        run: python scripts/show_reports.py

      - name: Heartbeat to Pulse
        if: success()
        env:
          PULSE_INGEST_TOKEN: ${{ secrets.PULSE_INGEST_TOKEN }}
        run: |
          curl -s -X POST "https://pulse-one-taupe.vercel.app/api/heartbeat" \
            -H "Authorization: Bearer $PULSE_INGEST_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"system_id":"strata","status":"up","metrics":{"ci":"green","tests":42}}' || true
