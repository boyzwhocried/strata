name: pages

# Build the dbt docs (static, self-contained) and publish the interactive
# lineage site to GitHub Pages on every push to main.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e .

      - name: Build the warehouse (needed for the docs catalog)
        run: |
          python -m generate
          dbt deps  --project-dir dbt --profiles-dir dbt
          dbt build --project-dir dbt --profiles-dir dbt

      - name: Generate static dbt docs
        run: dbt docs generate --static --project-dir dbt --profiles-dir dbt

      - name: Assemble site
        run: |
          mkdir -p _site
          cp dbt/target/static_index.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
